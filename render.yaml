services:
  - type: web
    name: riverside-home-guide
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python app.py
    envVars:
      - key: DEBUG
        value: false
      - key: FLASK_SECRET_KEY
        generateValue: true
      - key: GOOGLE_API_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: BASE_URL
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: riverside-db
          property: connectionString

databases:
  - name: riverside-db
    plan: free
    databaseName: riverside_home
    user: riverside_user
